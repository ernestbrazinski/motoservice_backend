services:
  postgres:
    image: postgres:16-alpine
    container_name: motoservice_postgres
    restart: unless-stopped
    ports:
      - '${DATABASE_PORT:-5450}:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER:-motoservice}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-motoservice}
      POSTGRES_DB: ${DATABASE_NAME:-motoservice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-motoservice} -d ${DATABASE_NAME:-motoservice}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
